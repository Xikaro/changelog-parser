name: 'Action Changelog Parse'
description: 'Parses changelog file'
branding:
  icon: 'clock'
  color: 'blue'
inputs:
  path:
    description: 'Path to the changelog file. By default standard changelog locations are used.'
    required: false
    default: ''
  version:
    description: 'Version of the changelog entry. By default the last released version is used.'
    required: false
    default: ''
outputs:
  version:
    description: 'Version from the changelog entry'
  versionMajor:
    description: 'The major version part'
  versionMinor:
    description: 'The minor version part'
  versionPatch:
    description: 'The patch version part'
  date:
    description: 'Release date from the changelog entry'
  status:
    description: 'Status from the changelog entry. Possibly one of the following: prerelease, release, unreleased'
  description:
    description: 'Description from the changelog entry'
  hasUnreleased:
    description: 'True if changelog has an Unreleased section, false otherwise'
  unreleasedVersion:
    description: 'Version from the Unreleased section (always "unreleased")'
  unreleasedStatus:
    description: 'Status from the Unreleased section (always "unreleased")'
  unreleasedDescription:
    description: 'Description from the Unreleased section'
  lastVersion:
    description: 'Version from the last changelog entry (Unreleased if exists, otherwise the last released version)'
  lastVersionMajor:
    description: 'The major version part of the last entry'
  lastVersionMinor:
    description: 'The minor version part of the last entry'
  lastVersionPatch:
    description: 'The patch version part of the last entry'
  lastDate:
    description: 'Release date from the last changelog entry'
  lastStatus:
    description: 'Status from the last changelog entry (unreleased, prerelease, or release)'
  lastDescription:
    description: 'Description from the last changelog entry'
runs:
  using: 'node20'
  main: 'build/dist/index.js'
